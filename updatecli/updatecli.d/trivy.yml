---
name: "Bump Trivy version"
scms:
  image-build-base:
    kind: "github"
    spec:
      user: "{{ .github.user }}"
      email: "{{ .github.email }}"
      username: "{{ .github.username }}"
      token: "{{ requiredEnv .github.token }}"
      owner: "rancher"
      repository: "image-build-base"
      branch: "master"
      commitmessage:
        title: "Bump Trivy version"

sources:
  trivy-release:
    name: "Get Trivy latest release from Registry"
    kind: "dockerimage"
    spec:
      image: "ghcr.io/aquasecurity/trivy"
      versionfilter:
        kind: "semver"
        pattern: ">0.0.0"

  trivy-sha-amd64:
    name: "Get Trivy AMD64 SHA256"
    kind: "shell"
    dependson:
      - "trivy-release"
    spec:
      command: >-
        curl -sL "https://github.com/aquasecurity/trivy/releases/download/v{{ source `trivy-release` }}/trivy_{{ source `trivy-release` }}_checksums.txt" | grep "Linux-64bit.tar.gz" | awk '{print $1}'

  trivy-sha-arm64:
    name: "Get Trivy ARM64 SHA256"
    kind: "shell"
    dependson:
      - "trivy-release"
    spec:
      command: >-
        curl -sL "https://github.com/aquasecurity/trivy/releases/download/v{{ source `trivy-release` }}/trivy_{{ source `trivy-release` }}_checksums.txt" | grep "Linux-ARM64.tar.gz" | awk '{print $1}'

conditions:
  trivy-version:
    name: "Check Trivy version in Dockerfile"
    kind: "file"
    scmid: "image-build-base"
    disablesourceinput: true
    spec:
      files:
        - "Dockerfile"
      matchpattern: 'TRIVY_VERSION={{ source `trivy-release` }}'
    failwhen: true

targets:
  trivy-version:
    name: "Update Trivy version in Dockerfile"
    kind: "file"
    scmid: "image-build-base"
    disablesourceinput: true
    spec:
      files:
        - "Dockerfile"
      matchpattern: 'TRIVY_VERSION=\d+\.\d+\.\d+'
      replacepattern: 'TRIVY_VERSION={{ source `trivy-release` }}'

  trivy-sha-amd64:
    name: "Update Trivy AMD64 SHA256 in Dockerfile"
    kind: "file"
    scmid: "image-build-base"
    disablesourceinput: true
    spec:
      files:
        - "Dockerfile"
      matchpattern: 'Linux-64bit\.tar\.gz";\s*\\\s*TRIVY_SHA256="[a-fA-F0-9]{64}"'
      replacepattern: "Linux-64bit.tar.gz\"; \\\n    TRIVY_SHA256=\"{{ source `trivy-sha-amd64` }}\""

  trivy-sha-arm64:
    name: "Update Trivy ARM64 SHA256 in Dockerfile"
    kind: "file"
    scmid: "image-build-base"
    disablesourceinput: true
    spec:
      files:
        - "Dockerfile"
      matchpattern: 'Linux-ARM64\.tar\.gz";\s*\\\s*TRIVY_SHA256="[a-fA-F0-9]{64}"'
      replacepattern: "Linux-ARM64.tar.gz\"; \\\n    TRIVY_SHA256=\"{{ source `trivy-sha-arm64` }}\""

actions:
  github:
    title: "Bump Trivy version"
    kind: "github/pullrequest"
    scmid: "image-build-base"
    spec:
      merge:
        strategy: auto
        mergemethod: squash
      draft: false
      parent: false
